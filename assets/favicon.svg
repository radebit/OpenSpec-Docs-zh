<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <!-- 主色渐变 -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <!-- 亮色渐变 -->
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <!-- 发光滤镜 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 圆角背景 -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bgGrad)"/>

  <!-- 外圈装饰圆弧 -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#6366f1" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.4"/>

  <!-- 文档主体（居中白色圆角矩形） -->
  <rect x="16" y="12" width="24" height="30" rx="3" ry="3" fill="url(#accentGrad)" opacity="0.15"/>
  <rect x="16" y="12" width="24" height="30" rx="3" ry="3" fill="none" stroke="url(#accentGrad)" stroke-width="1.2"/>

  <!-- 文档折角 -->
  <polyline points="34,12 40,12 40,18 34,18 34,12" fill="#1e1b4b" stroke="url(#lightGrad)" stroke-width="1"/>
  <line x1="34" y1="12" x2="40" y2="18" stroke="url(#lightGrad)" stroke-width="1"/>

  <!-- 文档内容线条（规范感） -->
  <line x1="20" y1="22" x2="36" y2="22" stroke="url(#lightGrad)" stroke-width="1.2" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="20" y1="26" x2="34" y2="26" stroke="#6366f1" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="20" y1="30" x2="32" y2="30" stroke="#6366f1" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="20" y1="34" x2="30" y2="34" stroke="#6366f1" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

  <!-- AI 节点图标（右下角，象征 AI 连接） -->
  <circle cx="44" cy="44" r="8" fill="#0f172a" stroke="url(#accentGrad)" stroke-width="1.5"/>
  <!-- 中心节点 -->
  <circle cx="44" cy="44" r="2.2" fill="url(#accentGrad)" filter="url(#glow)"/>
  <!-- 放射连接线 -->
  <line x1="44" y1="37" x2="44" y2="40" stroke="#818cf8" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <line x1="44" y1="48" x2="44" y2="51" stroke="#818cf8" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <line x1="37" y1="44" x2="40" y2="44" stroke="#818cf8" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <line x1="48" y1="44" x2="51" y2="44" stroke="#818cf8" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <!-- 斜向连接 -->
  <line x1="39" y1="39" x2="41" y2="41" stroke="#6366f1" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="47" y1="47" x2="49" y2="49" stroke="#6366f1" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
</svg>
